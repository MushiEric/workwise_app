name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - '**'

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get --no-precompile

      - name: Static analysis
        run: flutter analyze

      - name: Run unit & widget tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build_android:
    name: Build Android (release on main)
    needs: analyze_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    env:
      APP_ENV: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Install dependencies
        run: flutter pub get --no-precompile

      - name: Build Android APK
        run: flutter build apk --release --dart-define=APP_ENV=prod --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Sentry release and upload mapping (conditional)
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' && secrets.SENTRY_ORG != '' && secrets.SENTRY_PROJECT != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ github.sha }}
        run: |
          echo "Installing sentry-cli..."
          curl -sL https://sentry.io/get-cli/ | bash
          echo "Creating release $SENTRY_RELEASE"
          sentry-cli --auth-token "$SENTRY_AUTH_TOKEN" releases new -p "$SENTRY_PROJECT" "$SENTRY_RELEASE"
          sentry-cli --auth-token "$SENTRY_AUTH_TOKEN" releases finalize "$SENTRY_RELEASE"
          # upload ProGuard / mapping files generated by Android R8/ProGuard
          if [ -d "android/app/build/outputs/mapping/release" ]; then
            echo "Uploading ProGuard mappings to Sentry"
            sentry-cli --auth-token "$SENTRY_AUTH_TOKEN" releases files "$SENTRY_RELEASE" upload-proguard android/app/build/outputs/mapping/release/
          else
            echo "No mapping files found to upload."
          fi

  optional_ios:
    name: Build iOS (macOS runner - optional)
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && env.IOS_SIGNING == 'true'
    env:
      APP_ENV: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (macOS)
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get --no-precompile

      - name: Build iOS (archive)
        run: flutter build ipa --export-options-plist=ios/ExportOptions.plist --dart-define=APP_ENV=prod

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/ipa
